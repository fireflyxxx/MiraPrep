spring:
  application:
    name: miraprep-business
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/miraprep}
    username: ${DB_USER:miraprep}
    password: ${DB_PASSWORD:change-me-mysql-password}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  internal-token: ${AI_INTERNAL_TOKEN:}
  storage:
    endpoint: ${OSS_ENDPOINT:http://localhost:9000}
    access-key: ${OSS_ACCESS_KEY:miraprep-admin}
    secret-key: ${OSS_SECRET_KEY:change-me-minio-password}
    bucket: ${OSS_BUCKET:miraprep}
    download-url-expiry-seconds: ${OSS_DOWNLOAD_URL_EXPIRY_SECONDS:900}
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
  resume:
    upload-window: ${RESUME_UPLOAD_WINDOW:3600}
    upload-max-attempts: ${RESUME_UPLOAD_MAX_ATTEMPTS:10}
  auth:
    jwt-secret: ${JWT_SECRET:local-development-secret-must-be-replaced-in-production-12345}
    access-ttl: ${JWT_ACCESS_TTL:900}
    refresh-ttl: ${JWT_REFRESH_TTL:1209600}
    verification:
      ttl: ${VERIFICATION_CODE_TTL:600}
      resend-ttl: ${VERIFICATION_CODE_RESEND_TTL:60}
      max-attempts: ${VERIFICATION_CODE_MAX_ATTEMPTS:5}
      fixed-code: ${VERIFICATION_FIXED_CODE:}
    login-window: ${LOGIN_RATE_LIMIT_WINDOW:60}
    login-max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
    token-store: ${AUTH_TOKEN_STORE:redis}
    rate-limiter: ${AUTH_RATE_LIMITER:redis}
